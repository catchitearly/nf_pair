<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nifty Options Pair Dashboard</title>
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
<style>
  :root {
    --bg:       #0d1117;
    --surface:  #161b22;
    --border:   #30363d;
    --text:     #e6edf3;
    --muted:    #8b949e;
    --green:    #3fb950;
    --red:      #f85149;
    --blue:     #58a6ff;
    --yellow:   #d29922;
    --purple:   #bc8cff;
    --accent:   #1f6feb;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-left h1 {
    font-size: 1.25rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .header-left h1 span {
    color: var(--blue);
  }

  .header-meta {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .badge {
    background: var(--accent);
    color: #fff;
    font-size: 0.7rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .legend-bar {
    display: flex;
    gap: 20px;
    padding: 10px 32px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.78rem;
    color: var(--muted);
  }

  .legend-dot {
    width: 24px;
    height: 3px;
    border-radius: 2px;
  }

  .main {
    padding: 24px 32px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .pair-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .pair-header {
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .pair-title {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text);
  }

  .pair-stats {
    display: flex;
    gap: 16px;
  }

  .stat {
    text-align: right;
  }

  .stat-label {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .stat-value {
    font-size: 0.85rem;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  .green { color: var(--green); }
  .red   { color: var(--red);   }
  .blue  { color: var(--blue);  }

  .chart-wrap {
    padding: 0;
  }

  .alerts-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .alerts-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 0.9rem;
    font-weight: 600;
  }

  .alerts-body {
    padding: 12px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 300px;
    overflow-y: auto;
  }

  .alert-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 12px;
    background: var(--bg);
    border-radius: 6px;
    font-size: 0.8rem;
  }

  .alert-icon { font-size: 1rem; }

  .alert-info { flex: 1; }

  .alert-pair {
    font-weight: 600;
    color: var(--text);
  }

  .alert-type {
    color: var(--muted);
    font-size: 0.75rem;
    margin-top: 1px;
  }

  .alert-price {
    font-variant-numeric: tabular-nums;
    font-weight: 700;
    font-size: 0.85rem;
  }

  .alert-time {
    color: var(--muted);
    font-size: 0.72rem;
    white-space: nowrap;
  }

  .no-alerts {
    color: var(--muted);
    font-size: 0.82rem;
    padding: 12px 0;
    text-align: center;
  }

  .error-card {
    padding: 32px;
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
  }

  @media (max-width: 640px) {
    .main { padding: 16px; }
    header { padding: 14px 16px; }
    .pair-stats { display: none; }
    .legend-bar { padding: 10px 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Nifty Options <span>Pair Dashboard</span></h1>

<div class="legend-bar">

  <div class="legend-item">

  <div class="legend-item">

  <div class="legend-item">

<div class="main" id="main">

</div>

const plotlyLayout = (label, annotations = []) => ({
  paper_bgcolor: 'transparent',
  plot_bgcolor:  'transparent',
  margin:        { t: 10, b: 40, l: 60, r: 20 },
  height:        280,
  annotations:   annotations,
  xaxis: {
    gridcolor:    '#21262d',
    tickfont:     { color: '#8b949e', size: 10 },
    linecolor:    '#30363d',
    showgrid:     true,
    tickangle:    -30,
  },
  yaxis: {
    gridcolor:    '#21262d',
    tickfont:     { color: '#8b949e', size: 10 },
    linecolor:    '#30363d',
    showgrid:     true,
    tickprefix:   '₹',
  },
  legend: { bgcolor: 'transparent', font: { color: '#8b949e', size: 10 } },
  hovermode: 'x unified',
  hoverlabel: {
    bgcolor:    '#161b22',
    bordercolor:'#30363d',
    font:       { color: '#e6edf3', size: 11 },
  },
});

const allAlerts = [];

function buildCharts() {
  const container = document.getElementById('charts-container');

  CHARTS.forEach((c, idx) => {
    const card = document.createElement('div');
    card.className = 'pair-card';

    if (c.error) {
      card.innerHTML = `
        <div class="pair-header"><span class="pair-title">${c.label}</span></div>
        <div class="error-card">⚠️ No data available for this pair</div>`;
      container.appendChild(card);
      return;
    }

    const lastPremium = c.premium.at(-1);
    const lastVwap    = c.vwap.at(-1);
    const lastEma     = c.ema9.at(-1);
    const vsVwap      = lastPremium - lastVwap;
    const vsEma       = lastPremium - lastEma;

    card.innerHTML = `
      <div class="pair-header">
        <span class="pair-title">${c.label}</span>
        <div class="pair-stats">
          <div class="stat">
            <div class="stat-label">Premium</div>
            <div class="stat-value blue">₹${lastPremium.toFixed(2)}</div>
          </div>
          <div class="stat">
            <div class="stat-label">vs VWAP</div>
            <div class="stat-value ${vsVwap >= 0 ? 'green' : 'red'}">${vsVwap >= 0 ? '+' : ''}${vsVwap.toFixed(2)}</div>
          </div>
          <div class="stat">
            <div class="stat-label">vs EMA9</div>
            <div class="stat-value ${vsEma >= 0 ? 'green' : 'red'}">${vsEma >= 0 ? '+' : ''}${vsEma.toFixed(2)}</div>
          </div>
        </div>
      </div>
      <div class="chart-wrap"><div id="chart-${idx}"></div></div>`;

    container.appendChild(card);

    // Annotate only the most recent 5 EMA9×VWAP crossovers for this pair
    const n = c.cx_labels.length;
    const recentIdx = [];
    for (let k = Math.max(0, n - 5); k < n; k++) recentIdx.push(k);

    const annotations = recentIdx.map(k => {
      const bull  = c.cx_labels[k].includes('↑');
      const color = bull ? '#3fb950' : '#f85149';

      allAlerts.push({
        pairLabel: c.label,
        time:      c.cx_times[k],
        type:      c.cx_labels[k],
        price:     c.cx_prices[k],
        bull,
      });

      return {
        x: c.cx_times[k],
        y: c.cx_y[k],
        text: 'EMA9×VWAP' + (bull ? ' ▲' : ' ▼'),
        showarrow:  true,
        arrowhead:  3,
        arrowsize:  1,
        arrowwidth: 1.6,
        arrowcolor: color,
        ax: 0,
        ay: bull ? 28 : -28,
        font:       { color: color, size: 10 },
        bgcolor:    '#161b22',
        bordercolor: color,
        borderwidth: 1,
        borderpad:   3,
      };
    });

    const traces = [
      {
        x: c.times, y: c.premium, name: 'Premium',
        type: 'scatter', mode: 'lines',
        line: { color: '#58a6ff', width: 2 },
      },
      {
        x: c.times, y: c.vwap, name: 'VWAP',
        type: 'scatter', mode: 'lines',
        line: { color: '#d29922', width: 1.5, dash: 'dot' },
      },
      {
        x: c.times, y: c.ema9, name: 'EMA 9',
        type: 'scatter', mode: 'lines',
        line: { color: '#bc8cff', width: 1.5, dash: 'dash' },
      },
    ];

    Plotly.newPlot(`chart-${idx}`, traces, plotlyLayout(c.label, annotations), {
      responsive:  true,
      displaylogo: false,
      modeBarButtonsToRemove: ['lasso2d', 'select2d'],
    });
  });
}

function buildAlerts() {
  const body = document.getElementById('alerts-body');
  if (allAlerts.length === 0) {
    body.innerHTML = '<div class="no-alerts">No crossover alerts in this session</div>';
    return;
  }

  // Most recent 5 crossovers across all pairs combined
  const recent = [...allAlerts]
    .sort((a, b) => b.time.localeCompare(a.time))
    .slice(0, 5);

  recent.forEach(a => {
    const color = a.bull ? '#3fb950' : '#f85149';
    const arrow = a.bull ? '▲' : '▼';
    const row = document.createElement('div');
    row.className = 'alert-row';
    row.style.borderLeft = `3px solid ${color}`;
    row.innerHTML = `
      <span class="alert-icon" style="color:${color}">${arrow}</span>
      <div class="alert-info">
        <div class="alert-pair">${a.pairLabel}</div>
        <div class="alert-type" style="color:${color}">${a.type}</div>
      </div>
      <div class="alert-price ${a.bull ? 'green' : 'red'}">₹${a.price.toFixed(2)}</div>
      <div class="alert-time">${a.time}</div>`;
    body.appendChild(row);
  });
}

buildCharts();
buildAlerts();
