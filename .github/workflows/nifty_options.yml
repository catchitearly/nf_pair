name: Nifty Analyzer Dashboard Deployment

on:
  # Runs every weekday at 3:45 PM IST (10:15 AM UTC) after market close
  schedule:
    - cron: '15 10 * * 1-5'
  # Allows you to trigger the workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  analyze_and_deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/checkout@v4
      with:
        python-version: '3.10'
        cache: 'pip' # caching pip dependencies

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fyers-apiv3 pandas numpy requests

    - name: Run Option Pair Analyzer
      env:
        FYERS_CLIENT_ID: ${{ secrets.FYERS_CLIENT_ID }}
        FYERS_ACCESS_TOKEN: ${{ secrets.FYERS_ACCESS_TOKEN }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py

    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Upload Pages Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'docs' # Uploads the entire docs directory generated by your script

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
