name: Nifty Options Pair Analyzer

on:
  
   
  workflow_dispatch: {}            # adds a manual "Run workflow" button for testing

permissions:
  contents: write   # required so this workflow can git-push the generated dashboard

concurrency:
  group: nifty-options-analyzer
  cancel-in-progress: false        # let an in-flight run finish before the next one starts

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install fyers-apiv3 pandas numpy requests

      - name: Run analyzer
        env:
          FYERS_CLIENT_ID: ${{ secrets.FYERS_CLIENT_ID }}
          FYERS_ACCESS_TOKEN: ${{ secrets.FYERS_ACCESS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python nifty_options_pair_analyzer.py

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit dashboard
        run: git add docs/index.html && (git diff --cached --quiet || git commit -m "Update Nifty options dashboard [skip ci]")

      - name: Push dashboard
        run: git pull --rebase origin "${GITHUB_REF_NAME}" || true; git push origin "${GITHUB_REF_NAME}"
